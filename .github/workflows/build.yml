name: Build Sources

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install AS source dependencies
        run: |
          for src in ./src/as/*/; do
            src="${src%/}"
            grep -qxF "${src#./}" .deprecated-sources && continue
            [ -f "$src/package.json" ] && (cd "$src" && npm ci)
          done

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install aidoku-cli
        run: |
          cargo install --git https://github.com/Aidoku/aidoku-rs --locked aidoku-cli
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Build all sources
        run: bash -O globstar ./build.sh

      - name: Commit and push compiled sources
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/
          git diff --staged --quiet || git commit -m "build: update compiled sources"
          git push
